<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS FAVORITOS | DIAMOND HATS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { 
            --azul-diamante: #00D2FF; 
            --negro-puro: #000000; 
        }

        body { 
            background-color: var(--negro-puro); 
            color: var(--azul-diamante); 
            font-family: 'Arial', sans-serif; 
        }

        .container-fav { 
            max-width: 900px; 
            margin-top: 50px; 
            border: 1px solid rgba(0, 210, 255, 0.3); 
            border-radius: 25px; 
            padding: 30px; 
            background: rgba(255,255,255,0.02); 
        }

        .item-fav { 
            border-bottom: 1px solid rgba(0, 210, 255, 0.1); 
            padding: 20px 0; 
            transition: 0.3s;
        }

        .item-fav:hover {
            background: rgba(0, 210, 255, 0.03);
        }

        .btn-action {
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 10px 20px;
        }

        .btn-move-cart {
            background-color: var(--azul-diamante);
            color: #000;
            border: none;
        }

        .btn-remove {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
        }
        
        .empty-state {
            padding: 100px 0;
            text-align: center;
        }

        
        #diamond-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            background-color: #050505;
            border: 2px solid var(--azul-diamante);
            border-radius: 15px;
            padding: 15px;
            z-index: 10001;
            box-shadow: 0px 0px 20px rgba(0, 210, 255, 0.4);
            transform: translateX(450px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
        }

        #diamond-notification.show {
            transform: translateX(0);
            visibility: visible;
        }
    </style>
</head>
<body>

    <div id="diamond-notification">
        <div class="d-flex align-items-center">
            <div class="fs-2 me-3 text-info"><i class="bi bi-cart-check-fill"></i></div>
            <div>
                <h6 class="mb-0 fw-bold text-white">¡ESTILO EN CAMINO!</h6>
                <small class="text-info" style="font-size: 0.75rem;">se añadió con éxito al carrito 💎</small>
            </div>
        </div>
    </div>

    <div class="container container-fav shadow-lg mb-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold m-0 text-uppercase" style="letter-spacing: 2px;">MIS FAVORITOS <i class="bi bi-heart-fill ms-2"></i></h1>
            <a href="index.html" class="btn btn-outline-info btn-sm rounded-pill px-4">VOLVER A LA TIENDA</a>
        </div>

        <div id="lista-favoritos">
            </div>
    </div>

    <script>
        function cargarFavoritos() {
            const lista = document.getElementById('lista-favoritos');
            let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
            
            if (favoritos.length === 0) {
                lista.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-heartbreak fs-1 mb-3"></i>
                        <h4>Aún no tienes gorras guardadas.</h4>
                        <p class="text-white-50">Explora el catálogo y guarda lo que más te guste.</p>
                    </div>`;
                return;
            }

            lista.innerHTML = "";
            
            favoritos.forEach((item, index) => {
                lista.innerHTML += `
                    <div class="item-fav d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
                        <div class="d-flex align-items-center flex-grow-1">
                            <img src="${item.imagen}" width="80" class="rounded shadow-sm me-4" onerror="this.src='https://via.placeholder.com/80?text=HAT'">
                            <div>
                                <h5 class="mb-0 text-white text-uppercase fw-bold">${item.nombre}</h5>
                                <span class="text-info fw-bold">$ ${item.precio.toLocaleString()}.00</span>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-remove btn-action" onclick="eliminarFavorito(${index})">
                                <i class="bi bi-trash"></i>
                            </button>
                            <button class="btn btn-move-cart btn-action" onclick="moverAlCarrito(${index})">
                                <i class="bi bi-cart-plus me-2"></i> MOVER AL CARRITO
                            </button>
                        </div>
                    </div>`;
            });
        }

        function eliminarFavorito(index) {
            let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
            favoritos.splice(index, 1);
            localStorage.setItem('favoritos', JSON.stringify(favoritos));
            cargarFavoritos();
        }

        function moverAlCarrito(index) {
            let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            
            const producto = favoritos[index];
            
            carrito.push(producto);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            
            favoritos.splice(index, 1);
            localStorage.setItem('favoritos', JSON.stringify(favoritos));
            
            
            const notification = document.getElementById('diamond-notification');
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);

            cargarFavoritos();
        }

        document.addEventListener('DOMContentLoaded', cargarFavoritos);
    </script>
</body>
</html>
